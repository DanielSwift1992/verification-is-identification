<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="A dot that reveals a panel on hover; its own click still navigates.">
<style>
.hover-pair .hover-panel { opacity: 0; visibility: hidden; transition: opacity 150ms ease 250ms, visibility 0s linear 400ms; }
.hover-pair .hover-trigger { cursor: pointer; }
.hover-pair .hover-trigger:hover ~ .hover-panel, .hover-pair .hover-panel:hover { opacity: 1; visibility: visible; transition-delay: 0s; }
.hover-highlight { transition: stroke 150ms ease, stroke-width 150ms ease; cursor: pointer; }
.hover-highlight:hover { stroke: var(--vi-accent, #FFDD2D); stroke-width: 3; }
</style>
<g class="hover-pair">
<g class="hover-trigger">
<g transform="translate(0, 0)">
<a href="/documentation/documentkit/exampletarget">
<circle cx="20" cy="20" r="10" fill="var(--vi-action, #336FEE)"/>
</a>
</g>
</g>
<g class="hover-panel">
<rect width="240" height="96" rx="10" fill="var(--vi-surface-track, #F6F7F8)"/>
<g transform="translate(44, 0)">
<text x="0" y="54" text-anchor="start" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="400" font-size="17">Revealed on hover</text>
</g>
</g>
</g>

</svg>
