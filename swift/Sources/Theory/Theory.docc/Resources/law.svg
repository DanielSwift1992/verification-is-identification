<svg viewBox="0 0 720 188" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The construction law: one seed, two moves, one floor.">
  <defs>
    <marker id="ahL" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0071e3"/>
    </marker>
  </defs>
  <g font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
    <line x1="240" y1="40" x2="240" y2="168" stroke="#d2d2d7" stroke-width="1"/>
    <line x1="480" y1="40" x2="480" y2="168" stroke="#d2d2d7" stroke-width="1"/>

    <!-- SEED -->
    <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#86868b">SEED</text>
    <circle cx="100" cy="86" r="15" fill="none" stroke="#1d1d1f" stroke-width="1.5"/>
    <circle cx="140" cy="86" r="15" fill="none" stroke="#1d1d1f" stroke-width="1.5"/>
    <line x1="120" y1="68" x2="120" y2="104" stroke="#0071e3" stroke-width="1.5"/>
    <text x="120" y="136" text-anchor="middle" font-size="14" font-weight="600" fill="#1d1d1f">Pair</text>
    <text x="120" y="156" text-anchor="middle" font-size="11" fill="#86868b">two sides · one boundary</text>

    <!-- MOVE -->
    <text x="360" y="28" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#86868b">MOVE</text>
    <text x="360" y="70" text-anchor="middle" font-size="11.5" fill="#1d1d1f">expand · + axis</text>
    <line x1="314" y1="80" x2="406" y2="80" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#ahL)"/>
    <line x1="406" y1="100" x2="314" y2="100" stroke="#1d1d1f" stroke-width="1.5" marker-end="url(#ahL)"/>
    <text x="360" y="118" text-anchor="middle" font-size="11.5" fill="#1d1d1f">compress · where</text>
    <text x="360" y="156" text-anchor="middle" font-size="11" fill="#86868b">two moves · no third</text>

    <!-- FLOOR -->
    <text x="600" y="28" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#86868b">FLOOR</text>
    <line x1="600" y1="64" x2="578" y2="86" stroke="#1d1d1f" stroke-width="1.5"/>
    <line x1="600" y1="64" x2="622" y2="86" stroke="#1d1d1f" stroke-width="1.5"/>
    <line x1="578" y1="92" x2="578" y2="106" stroke="#1d1d1f" stroke-width="1.5"/>
    <line x1="622" y1="92" x2="622" y2="106" stroke="#1d1d1f" stroke-width="1.5"/>
    <circle cx="600" cy="60" r="5" fill="#0071e3"/>
    <circle cx="578" cy="89" r="4" fill="none" stroke="#1d1d1f" stroke-width="1.3"/>
    <circle cx="622" cy="89" r="4" fill="none" stroke="#1d1d1f" stroke-width="1.3"/>
    <text x="578" y="122" text-anchor="middle" font-size="12" fill="#86868b">∅</text>
    <text x="622" y="122" text-anchor="middle" font-size="12" fill="#86868b">∅</text>
    <text x="600" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">width × depth</text>
    <text x="600" y="163" text-anchor="middle" font-size="11" fill="#86868b">finite — every chain ends at ∅</text>
  </g>
</svg>
