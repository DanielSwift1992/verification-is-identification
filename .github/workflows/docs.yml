name: Docs

# Build the documentation site on every push to main and deploy it to GitHub Pages.
# The site is never committed — it is built fresh here and served from Pages.
# One-time setup: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (LawCheck enforces the law) and test
        run: |
          swift --version
          swift build
          swift test

      - name: Count declarations per target (Tools census)
        run: swift run Tools census

      - name: The grammar carries every source file
        run: swift run Tools grammar

      - name: The README's numbers are counted, not remembered
        run: swift run Tools readme

      - name: A rule is one substitution (§S28, the triples dictionary)
        run: swift run Tools lint Sources/DynamicsDemo/Rules.swift --strict

      - name: Topics stay equal to the type lattice
        run: swift package --allow-writing-to-package-directory tree-sort check

      - name: The second judge agrees with the compiler
        run: swift run Tools judge diff 200

      - name: The committed artifacts match the types, byte for byte
        run: |
          swift package --allow-writing-to-package-directory generate
          swift run OrgDemo render-doc
          swift run DocumentKitDemo render-doc
          swift run VectorDemo all
          git diff --exit-code

      - name: Generate the combined documentation site
        run: >
          swift package
          --allow-writing-to-directory "$GITHUB_WORKSPACE/_site"
          generate-documentation
          --enable-experimental-combined-documentation
          --experimental-enable-custom-templates
          --target VerificationIsIdentification --target Organization
          --target DocumentKit --target Examples
          --target GrammarLexicon --target Alphabet
          --transform-for-static-hosting
          --hosting-base-path verification-is-identification
          --output-path "$GITHUB_WORKSPACE/_site"

      - name: One hook in every shell (the guard makes a second copy inert)
        run: |
          python3 - << 'EOF'
          import pathlib
          hook = pathlib.Path('Sources/Organization/Organization.docc/footer.html').read_text()
          root = pathlib.Path('_site')
          patched = 0
          for shell in root.rglob('index.html'):
              s = shell.read_text()
              if '__viInlineHook' in s or '</body>' not in s:
                  continue
              shell.write_text(s.replace('</body>', hook + '</body>'))
              patched += 1
          print('shells patched:', patched)
          EOF

      - name: Redirect the site root to the library documentation
        run: echo '<!DOCTYPE html><meta charset="utf-8"><title>Verification Is Identification</title><meta http-equiv="refresh" content="0; url=./documentation/verificationisidentification/"><a href="./documentation/verificationisidentification/">Documentation</a>' > "$GITHUB_WORKSPACE/_site/index.html"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
