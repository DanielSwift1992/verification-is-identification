<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 112" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="Two doors: the individual contributors, or the leads and managers.">
<filter id="surface-card-shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity="var(--vi-surface-card-shadow-opacity, 0.10)"/>
</filter>
<g transform="translate(0, 16)">
<g transform="translate(132, 0)">
<a href="/documentation/organization/financeindividualcontributors">
<g filter="url(#surface-card-shadow)">
<rect x="0" width="220" height="80" rx="16" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g transform="translate(0, 0)">
<text x="110" y="45" text-anchor="middle" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="15">IndividualContributor</text>
</g>
</a>
</g>
<g transform="translate(368, 0)">
<a href="/documentation/organization/financeleadormanager">
<g filter="url(#surface-card-shadow)">
<rect x="0" width="220" height="80" rx="16" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g transform="translate(0, 0)">
<text x="110" y="45" text-anchor="middle" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="15">Lead, Manager</text>
</g>
</a>
</g>
</g>
</svg>
