<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 150" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="The phone-book walk playing itself to Lovelace, Alice: 8 choices, each frame the step's two doors with the taken one marked, ending frozen on her name, which is a real link to her page.">
<g transform="translate(0, 0)">
<rect x="0" width="960" height="150" rx="12" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="0s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: </text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">Allen, Barbara … Lamport, Ken</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Lamport, Margaret … Wirth, Radia</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="2s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Lamport, Margaret … McCarthy, Radia</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">McCarthy, Radia … Wirth, Radia</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="4s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">Lamport, Margaret … Liskov, Niklaus</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Liskov, Radia … McCarthy, Radia</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="6s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left · right</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Liskov, Radia … McCarthy, Frances</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">McCarthy, John … McCarthy, Radia</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="8s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left · right · left</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Liskov, Radia … McCarthy, Dennis</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">McCarthy, Dennis … McCarthy, Frances</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="10s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left · right · left · left</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Liskov, Radia … Lovelace, Alice</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">McCarthy, Barbara … McCarthy, Dennis</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="12s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left · right · left · left · left</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">Liskov, Radia … Liskov, Radia</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Liskov, Radia … Lovelace, Alice</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="14s" dur="2s"/>
<g transform="translate(16, 0)">
<text x="464" y="34" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="11">The word so far: right · left · right · left · left · left · right</text>
<text x="464" y="76" text-anchor="middle" fill="var(--vi-text-secondary, rgba(0,0,0,0.54))" font-weight="400" font-size="13">Liskov, Radia … Liskov, Radia</text>
<text x="464" y="110" text-anchor="middle" fill="var(--vi-action, #336FEE)" font-weight="700" font-size="13">Lovelace, Alice … Lovelace, Alice</text>
</g>
</g>
<g opacity="0"><set attributeName="opacity" to="1" begin="16s" fill="freeze"/>
<g transform="translate(16, 0)">
<a href="/documentation/organization/alice">
<g class="hover-lift" style="--tx:0px;--ty:0px">
<text x="464" y="82" text-anchor="middle" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="13">Lovelace, Alice (Alice)</text>
</g>
</a>
</g>
</g>

</svg>
