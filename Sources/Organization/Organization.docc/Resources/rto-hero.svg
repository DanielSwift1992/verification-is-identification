<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 112" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="The three work arrangements and whether each meets the office minimum, read off the same conformance the table below checks.">
<filter id="surface-card-shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity="var(--vi-surface-card-shadow-opacity, 0.10)"/>
</filter>
<g transform="translate(0, 16)">
<g transform="translate(14, 0)">
<g filter="url(#surface-card-shadow)">
<rect x="0" width="220" height="80" rx="16" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g transform="translate(16, 0)">
<text x="0" y="28" text-anchor="start" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="17">OnSite</text>
<g transform="translate(0, 44)">
<g transform="translate(0, 0)">
<rect x="0" width="90" height="22" rx="10" fill="var(--vi-accent, #FFDD2D)"/>
<g transform="translate(8, 0)">
<text x="0" y="15" text-anchor="start" fill="var(--vi-on-accent, #1C1C1E)" font-weight="400" font-size="10">Meets minimum</text>
</g>
</g>
</g>
</g>
</g>
<g transform="translate(250, 0)">
<g filter="url(#surface-card-shadow)">
<rect x="0" width="220" height="80" rx="16" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g transform="translate(16, 0)">
<text x="0" y="28" text-anchor="start" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="17">Hybrid</text>
<g transform="translate(0, 44)">
<g transform="translate(0, 0)">
<rect x="0" width="90" height="22" rx="10" fill="var(--vi-accent, #FFDD2D)"/>
<g transform="translate(8, 0)">
<text x="0" y="15" text-anchor="start" fill="var(--vi-on-accent, #1C1C1E)" font-weight="400" font-size="10">Meets minimum</text>
</g>
</g>
</g>
</g>
</g>
<g transform="translate(486, 0)">
<g filter="url(#surface-card-shadow)">
<rect x="0" width="220" height="80" rx="16" fill="var(--vi-surface-card, #FFFFFF)" stroke="var(--vi-line, #EAECEE)" stroke-width="1"/>
</g>
<g transform="translate(16, 0)">
<text x="0" y="28" text-anchor="start" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="700" font-size="17">Remote</text>
<g transform="translate(0, 44)">
<g transform="translate(0, 0)">
<rect x="0" width="90" height="22" rx="10" fill="var(--vi-surface-track, #F6F7F8)"/>
<g transform="translate(8, 0)">
<text x="0" y="15" text-anchor="start" fill="var(--vi-text-primary, rgba(0,0,0,0.80))" font-weight="400" font-size="10">Below minimum</text>
</g>
</g>
</g>
</g>
</g>
