<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 150" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="The six documents: two owned, marked with a dot, four shared, each linking to its owner or its department.">
