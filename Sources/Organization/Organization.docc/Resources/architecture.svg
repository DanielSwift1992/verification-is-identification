<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="Architecture: System, Query, View, and DocumentKit are all written in the VerificationIsIdentification (V=I) framework's types, the package's one dependency, not Foundation — four dashed arrows, one shared label. The solid flow runs System to Query to View to DocumentKit to the documentation site; View is also read a second way, directly, by the console audit (swift run OrgDemo audit), bypassing the render engine entirely.">
