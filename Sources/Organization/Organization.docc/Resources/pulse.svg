</filter>
<style>
.hover-lift { transform: translate(var(--tx), var(--ty)); transition: transform 150ms ease; cursor: pointer; }
.hover-lift:hover { transform: translate(var(--tx), calc(var(--ty) - 2px)); }
</style>
