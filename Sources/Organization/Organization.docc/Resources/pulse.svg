<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" data-vi-canvas="1" font-family="Inter, Roboto, system-ui, sans-serif" aria-label="Company Pulse: headcount, departments, certified rules, and standing invariants, read live from the proved types. Each card links to its own page.">
<filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
</filter>
